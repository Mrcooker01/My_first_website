<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Dev UI</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Vazirmatn}
body{
  background:#050510;
  color:#fff;
  overflow-x:hidden;
}

/* CURSOR GLOW */
.cursor{
  width:20px;height:20px;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  background:radial-gradient(circle,#00f5ff,#a020f0);
  mix-blend-mode:screen;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:1000;
}

.logo{
  font-weight:800;
  color:#00f5ff;
  letter-spacing:2px;
}

.menu{
  cursor:pointer;
  font-size:26px;
  transition:0.3s;
}
.menu:hover{transform:rotate(90deg)}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;left:-300px;
  width:280px;height:100%;
  background:rgba(10,10,20,0.7);
  backdrop-filter:blur(20px);
  padding:90px 20px;
  transition:0.5s;
  border-right:1px solid rgba(255,255,255,0.1);
}
.sidebar.active{left:0}

.sidebar a{
  display:block;
  margin:18px 0;
  color:#fff;
  text-decoration:none;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
}
.sidebar a:hover{
  background:linear-gradient(90deg,#00f5ff,#a020f0);
  transform:translateX(10px);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-size:60px;
  background:linear-gradient(90deg,#00f5ff,#a020f0,#ff0066);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  opacity:0.7;
  margin-top:10px;
}

.btn{
  margin-top:25px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  background:linear-gradient(90deg,#00f5ff,#a020f0);
  color:white;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #00f5ff;
}

/* PARTICLES */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CARDS */
section{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:100px 30px;
}

.card{
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:0.4s;
}
.card:hover{
  transform:translateY(-15px) scale(1.03);
  box-shadow:0 0 30px rgba(0,245,255,0.3);
  background:rgba(0,245,255,0.08);
}

@media(max-width:600px){
  .hero h1{font-size:34px;}
}
</style>
</head>

<body>

<div id="particles"></div>
<div class="cursor" id="cursor"></div>

<nav>
  <div class="logo">ULTRA.DEV</div>
  <div class="menu" onclick="toggle()">☰</div>
</nav>

<div class="sidebar" id="sidebar">
  <a href="#">Home</a>
  <a href="#">Work</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<div class="hero">
  <h1 id="title">Next Level Developer UI</h1>
  <p id="sub">Animated • Responsive • Futuristic Design</p>
  <button class="btn">Launch</button>
</div>

<section>
  <div class="card">⚡ Ultra Fast UI Engine</div>
  <div class="card">🎯 Precision Animations</div>
  <div class="card">🌌 Cosmic Visual Design</div>
  <div class="card">📱 Fully Responsive Layout</div>
</section>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
// SIDEBAR
function toggle(){
  document.getElementById("sidebar").classList.toggle("active");
}

// CURSOR
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// GSAP ANIMATION
gsap.from("#title",{y:50,opacity:0,duration:1});
gsap.from("#sub",{y:30,opacity:0,duration:1,delay:0.3});
gsap.from(".btn",{scale:0,opacity:0,duration:0.8,delay:0.6});

// PARTICLES BACKGROUND
particlesJS("particles",{
  particles:{
    number:{value:60},
    size:{value:3},
    move:{speed:1},
    line_linked:{enable:true,color:"#00f5ff"}
  }
});
</script>

</body>
</html>
