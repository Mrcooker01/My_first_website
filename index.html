<!DOCTYPE html><html lang="en">
<head>

        }header {
        background-color: #333;
        color: white;
        padding: 15px;

    }

    nav {

    }

    nav a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

        border-radius: 8px;

    }

    footer {
        background: #333;

        padding: 10px;
        position: fixed;
        bottom: 0;

    }
</style>

</head>

    <h1>My First Website</h1>

</header><nav>

</nav><div class="container">
    <div class="card">
        <h2>Welcome</h2>

    </div><div class="card">

    <p>I am learning web development and this is one of my first projects.</p>

</html>
